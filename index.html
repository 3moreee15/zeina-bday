<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>زينة | 20 🎀</title>
  <style>
    :root{
      --bg1:#ffb6d5; --bg2:#ffd6ea; --card:#ffffffcc;
      --pink:#ff4fa3; --pink2:#ff7fc3; --text:#3b2b2f;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 15% 10%, #fff 0%, transparent 60%),
        radial-gradient(900px 600px at 90% 30%, #fff 0%, transparent 55%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }
    .sparkle{
      position:absolute; inset:-30px;
      background-image:
        radial-gradient(#fff8 1px, transparent 1px),
        radial-gradient(#fff6 1px, transparent 1px);
      background-size: 28px 28px, 44px 44px;
      background-position: 0 0, 10px 18px;
      animation: float 10s linear infinite;
      pointer-events:none; opacity:.75;
    }
    @keyframes float{ from{transform:translateY(0)} to{transform:translateY(-40px)} }

    .card{
      width:min(620px, 92vw);
      background:var(--card);
      border:1px solid #fff;
      border-radius:24px;
      box-shadow: 0 16px 44px #0000001a;
      padding:18px;
      position:relative;
      backdrop-filter: blur(6px);
    }
    .top{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap}
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      background:linear-gradient(135deg, #fff, #ffe8f3);
      border:1px solid #ffd1e7;
      font-weight:800;
    }
    .title{margin:12px 0 6px; font-size:28px}
    .sub{margin:0 0 14px; opacity:.88; line-height:1.8}

    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:6px}
    .btn{
      flex:1;
      padding:12px 14px; border:0; border-radius:14px;
      cursor:pointer; font-size:15px; font-weight:900;
      transition: transform .08s ease, filter .2s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn.primary{
      color:#fff;
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      box-shadow: 0 10px 22px #ff4fa345;
    }
    .btn.ghost{
      background:#fff;
      border:1px solid #ffd1e7;
      color:var(--pink);
    }

    .hero{
      margin-top:14px;
      display:grid;
      grid-template-columns: 160px 1fr;
      gap:14px;
      align-items:center;
      background:#ffffffa6;
      border:1px dashed #ff9fcd;
      border-radius:18px;
      padding:14px;
      position:relative;
      overflow:hidden;
    }
    @media (max-width:560px){ .hero{grid-template-columns:1fr; text-align:center} }

    .imgWrap{
      width:160px; height:160px; border-radius:22px;
      background:linear-gradient(135deg,#ffe4f1,#fff);
      border:1px solid #ffd1e7;
      display:grid; place-items:center;
      overflow:hidden;
    }
    .imgWrap img{width:100%; height:100%; object-fit:cover; display:none}
    .imgWrap .ph{font-size:12px; opacity:.85; padding:10px; text-align:center}

    .bigMsg{margin:0; font-size:20px; line-height:1.9; font-weight:900}
    .typed{
      display:inline-block;
      border-left: 2px solid #ff4fa3;
      padding-left:6px;
      animation: caret .9s steps(1) infinite;
    }
    @keyframes caret{ 50%{border-left-color:transparent} }

    .mini{margin-top:10px; font-size:13px; opacity:.82; line-height:1.7}

    .gift{
      margin-top:14px;
      display:none;
      background:#fff;
      border:1px solid #ffd1e7;
      border-radius:18px;
      padding:14px;
      line-height:1.9;
      position:relative;
    }
    .gift h3{margin:0 0 8px}
    .ribbon{
      position:absolute; top:-10px; left:18px;
      background:linear-gradient(135deg,var(--pink),var(--pink2));
      color:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-weight:900;
      box-shadow:0 10px 18px #ff4fa334;
    }

    .heart{
      position:fixed; font-size:18px; opacity:.9;
      animation: pop 1.2s ease forwards;
      pointer-events:none;
      filter: drop-shadow(0 6px 10px #ff4fa33a);
    }
    @keyframes pop{
      0%{transform:translate(-50%,-50%) scale(.6); opacity:0}
      20%{opacity:1}
      100%{transform:translate(-50%,-140%) scale(1.25); opacity:0}
    }

    .toast{
      position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
      background:#ffffffd9; border:1px solid #ffd1e7;
      padding:10px 12px; border-radius:999px;
      box-shadow:0 10px 24px #0000001a;
      display:none; font-weight:900;
    }

    .confetti{
      position:fixed; top:-20px;
      transition: transform 1.7s ease, opacity 1.7s ease;
      will-change: transform;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="sparkle"></div>

  <main class="card" id="card">
    <div class="top">
      <div class="badge">🎀 مفاجأة لزينة</div>
      <div class="badge" id="dateBadge">📅 اليوم</div>
    </div>

    <h1 class="title">زينة… عيد ميلاد 20 سنة 🎂✨</h1>
    <p class="sub">
      اضغطي زر “افتح الهدية” وشوفي المفاجأة… واضغطي داخل البطاقة عشان تطلع قلوب 💗
    </p>

    <div class="actions">
      <button class="btn primary" id="openGift">افتح الهدية 🎁</button>
      <button class="btn ghost" id="playAgain">عيدي الحركات ✨</button>
      <button class="btn ghost" id="copyLink">انسخ رابط الصفحة</button>
    </div>

    <section class="hero" aria-live="polite">
      <div class="imgWrap">
        <!-- ارفعي صورتك (مثلاً هيلو كيتي/ورد/أي صورة لطيفة تملكينها) باسم photo.png -->
        <img id="photo" src="photo.png" alt="صورة لطيفة" />
        <div class="ph" id="ph">
          لإضافة صورة 🎀<br>
          حطي ملف باسم <b>photo.png</b><br>
          داخل نفس المجلد
        </div>
      </div>

      <div>
        <p class="bigMsg">
          <span id="line1">يا زينة 🎀</span><br>
          <span id="line2" class="typed">…</span>
        </p>
        <p class="mini" id="mini">تلميح: جرّبي تضغطين داخل البطاقة 💗</p>
      </div>
    </section>

    <section class="gift" id="giftBox">
      <div class="ribbon">💖 مفاجأة</div>
      <h3>زينة 🌸</h3>
      <div id="giftText"></div>
    </section>
  </main>

  <div class="toast" id="toast">تم ✅</div>

  <script>
    const $ = (id)=>document.getElementById(id);

    // التاريخ
    const now = new Date();
    const fmt = new Intl.DateTimeFormat("ar-SA", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
    $("dateBadge").textContent = "📅 " + fmt.format(now);

    // الصورة إذا موجودة
    const img = $("photo");
    img.addEventListener("load", ()=>{ img.style.display="block"; $("ph").style.display="none"; });
    img.addEventListener("error", ()=>{ img.style.display="none"; $("ph").style.display="block"; });

    // نص التهنئة (20 سنة)
    const NAME = "زينة";
    const MESSAGE =
`كل سنة وإنتِ طيبة يا زينة 💗
اليوم تكملين 20 سنة… يا جمال هالعمر! 🎂✨
الله يجعل هالسنة أجمل سنة بحياتك:
فرح كثير، ونجاحات أكبر، وأيام وردية مثل قلبك 🌸🎀
عقبال 100 سنة وأنتِ بصحة وسعادة 🤍`;

    function showToast(text){
      const t = $("toast");
      t.textContent = text;
      t.style.display = "block";
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>t.style.display="none", 1400);
    }

    // كتابة حرف حرف
    function typeText(el, text, speed=22){
      el.classList.add("typed");
      el.textContent = "";
      let i = 0;
      clearInterval(typeText._t);
      typeText._t = setInterval(()=>{
        el.textContent += text[i] ?? "";
        i++;
        if(i > text.length){
          clearInterval(typeText._t);
          setTimeout(()=>el.classList.remove("typed"), 600);
        }
      }, speed);
    }

    // كونفيتي (قلوب/لمعات/شرائط)
    function burst(){
      const symbols = ["💗","✨","🎀","🌸","💞","⭐️","🎂"];
      for(let i=0;i<32;i++){
        const s = document.createElement("div");
        s.className="confetti";
        s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        s.style.left = (Math.random()*100)+"vw";
        s.style.fontSize = (14 + Math.random()*18)+"px";
        s.style.opacity = 0.95;
        document.body.appendChild(s);

        requestAnimationFrame(()=>{
          const x = (Math.random()*60 - 30);
          const y = (window.innerHeight + 140);
          s.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random()*240-120}deg)`;
          s.style.opacity = 0;
        });
        setTimeout(()=>s.remove(), 1800);
      }
    }

    // قلوب عند الضغط داخل البطاقة
    $("card").addEventListener("click", (e)=>{
      const heart = document.createElement("div");
      heart.className="heart";
      heart.textContent = "💗";
      heart.style.left = e.clientX+"px";
      heart.style.top  = e.clientY+"px";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(), 1200);
    });

    function runIntro(){
      $("line1").textContent = `يا ${NAME} 🎀`;
      typeText($("line2"), `عيد ميلاد سعيد… وعقبال أعوامك الجاية كلها وردية 💖`, 20);
      burst();
    }

    // فتح الهدية
    $("openGift").addEventListener("click", ()=>{
      const box = $("giftBox");
      box.style.display = "block";
      $("giftText").textContent = ""; // لتصير الحركة واضحة
      burst();
      // “تايب” داخل الهدية
      setTimeout(()=> typeText($("giftText"), MESSAGE, 14), 150);
      showToast("انفتحت الهدية 🎁");
      box.scrollIntoView({behavior:"smooth", block:"nearest"});
    });

    // إعادة الحركات
    $("playAgain").addEventListener("click", ()=>{
      runIntro();
      showToast("يلا نعيد ✨");
    });

    // نسخ رابط الصفحة
    $("copyLink").addEventListener("click", async ()=>{
      try{
        await navigator.clipboard.writeText(location.href);
        showToast("تم نسخ الرابط ✅");
      }catch{
        prompt("انسخي الرابط:", location.href);
      }
    });

    // تشغيل تلقائي أول ما تفتح
    runIntro();
  </script>
</body>
</html>
